[pytest]
minversion = 8.0
addopts =
    -v
    -s
    --alluredir=reports/allure-results
    --tb=short
testpaths = tests
markers =
    ui: UI tests (Playwright)
    api: API tests
    smoke: smoke tests
    regression: regression tests
    slow: slow tests
strict = true
log_cli = true
log_cli_level = INFO