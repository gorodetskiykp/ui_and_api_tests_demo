name: Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.10"
  BASE_URL: "https://the-internet.herokuapp.com"
  API_BASE_URL: "https://jsonplaceholder.typicode.com"
  VALID_USERNAME: "tomsmith"
  VALID_PASSWORD: "SuperSecretPassword!"

jobs:
  # ============================================
  # JOB 1: Linting
  # ============================================
  lint:
    name: 🔍 Lint with Ruff
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff check
        run: ruff check . --output-format=github

      - name: Run Ruff format check
        run: ruff format --check .

  # ============================================
  # JOB 2: UI Tests (локально)
  # ============================================
  ui-tests:
    name: 🎨 UI Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Run UI tests
        run: |
          pytest tests/ui/ -m ui \
            --alluredir=allure-results/ui \
            -n auto \
            --reruns 2 \
            --reruns-delay 1
      
      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-ui
          path: allure-results/ui/
          retention-days: 7
          if-no-files-found: warn

  # ============================================
  # JOB 3: API Tests (локально)
  # ============================================
  api-tests:
    name: 🔌 API Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          pytest tests/api/ -m api \
            --alluredir=allure-results/api \
            -n auto \
            --reruns 2

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-api
          path: allure-results/api/
          retention-days: 7
          if-no-files-found: warn

  # ============================================
  # JOB 4: Docker Tests (НОВЫЙ)
  # ============================================
  docker-tests:
    name: 🐳 Docker Tests
    runs-on: ubuntu-latest
    needs: lint  # ← Запускается после успешного lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ui-api-tests:latest .

      - name: Create .env file for Docker
        run: |
          cat > .env <<EOF
          BASE_URL=${{ env.BASE_URL }}
          API_BASE_URL=${{ env.API_BASE_URL }}
          VALID_USERNAME=${{ env.VALID_USERNAME }}
          VALID_PASSWORD=${{ env.VALID_PASSWORD }}
          HEADLESS=true
          EOF

      - name: Run all tests in Docker
        run: |
          docker run --rm \
            --env-file .env \
            -v ${{ github.workspace }}/allure-results-docker:/app/reports/allure-results \
            ui-api-tests:latest \
            pytest \
              --alluredir=reports/allure-results/docker \
              -n auto \
              --reruns 2 \
              --reruns-delay 1

      - name: Upload Docker test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-docker
          path: allure-results-docker/docker/
          retention-days: 7
          if-no-files-found: warn

  # ============================================
  # JOB 5: Allure Report
  # ============================================
    allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [ui-tests, api-tests, docker-tests]
    if: always()
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download UI results
        if: always()
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-results-ui
          path: allure-results/ui/

      - name: Download API results
        if: always()
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-results-api
          path: allure-results/api/

      - name: Download Docker results
        if: always()
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-results-docker
          path: allure-results/docker/

      # === УСТАНОВКА ALLURE CLI ===
      - name: Setup Java (для Allure)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          curl -o allure.zip -L https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.zip
          unzip -q allure.zip -d /opt/allure
          echo "/opt/allure/allure-2.30.0/bin" >> $GITHUB_PATH
          allure --version

      # === ГЕНЕРАЦИЯ ОТЧЁТА ===
      - name: Get Allure history
        uses: actions/checkout@v5
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare history
        if: always()
        run: |
          mkdir -p allure-history
          if [ -d "gh-pages" ] && [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history allure-history/ || true
          fi

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results -o allure-report --clean
            # Копируем history для следующего запуска
            cp -r allure-report/history allure-history/ 2>/dev/null || true
            cp -r allure-report/* allure-history/ 2>/dev/null || true
          else
            echo "::warning::No allure results found, skipping report generation"
            mkdir -p allure-history
            echo "<html><body><h1>No test results available</h1></body></html>" > allure-history/index.html
          fi

      - name: Upload Allure Report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: warn

      # === ДЕПЛОЙ НА GITHUB PAGES ===
      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: allure-history/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Comment PR with Allure link
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const runId = context.runId;
            const repo = context.repo;
            const artifactUrl = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: repo.owner,
              repo: repo.repo,
              body: `## 📊 Allure Report\n\n📦 [Скачать отчёт из артефактов](${artifactUrl})\n\nПосле мержа в main отчёт будет опубликован на GitHub Pages.`
            });

  # ============================================
  # JOB 6: Summary
  # ============================================
  summary:
    name: ✅ Summary
    runs-on: ubuntu-latest
    needs: [lint, ui-tests, api-tests, docker-tests, allure-report]  # ← Добавили docker-tests
    if: always()
    
    steps:
      - name: Check results
        run: |
          echo "## 🎯 Test Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🎨 UI Tests: ${{ needs.ui-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔌 API Tests: ${{ needs.api-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🐳 Docker Tests: ${{ needs.docker-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Allure Report: ${{ needs.allure-report.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Проверяем ВСЕ критичные jobs
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.ui-tests.result }}" != "success" ] || \
             [ "${{ needs.api-tests.result }}" != "success" ] || \
             [ "${{ needs.docker-tests.result }}" != "success" ]; then
            echo "❌ **Pipeline failed!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Причины:**" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.lint.result }}" != "success" ] && echo "- 🔍 Lint: \`${{ needs.lint.result }}\`" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.ui-tests.result }}" != "success" ] && echo "- 🎨 UI Tests: \`${{ needs.ui-tests.result }}\`" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.api-tests.result }}" != "success" ] && echo "- 🔌 API Tests: \`${{ needs.api-tests.result }}\`" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.docker-tests.result }}" != "success" ] && echo "- 🐳 Docker Tests: \`${{ needs.docker-tests.result }}\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY
          fi