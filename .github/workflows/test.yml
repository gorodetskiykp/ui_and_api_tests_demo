name: Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.10"
  BASE_URL: "https://the-internet.herokuapp.com"
  API_BASE_URL: "https://jsonplaceholder.typicode.com"
  VALID_USERNAME: "tomsmith"
  VALID_PASSWORD: "SuperSecretPassword!"

jobs:
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff check
        run: ruff check . --output-format=github

      - name: Run Ruff format check
        run: ruff format --check .

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Run UI tests
        run: |
          pytest tests/ui/ -m ui \
            --alluredir=allure-results/ui \
            -n auto \
            --reruns 2 \
            --reruns-delay 1

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-ui
          path: allure-results/ui/
          retention-days: 7
          if-no-files-found: warn

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          pytest tests/api/ -m api \
            --alluredir=allure-results/api \
            -n auto \
            --reruns 2

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-api
          path: allure-results/api/
          retention-days: 7
          if-no-files-found: warn

  docker-tests:
    name: Docker Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ui-api-tests:latest .

      - name: Create .env file for Docker
        run: |
          cat > .env <<EOF
          BASE_URL=${{ env.BASE_URL }}
          API_BASE_URL=${{ env.API_BASE_URL }}
          VALID_USERNAME=${{ env.VALID_USERNAME }}
          VALID_PASSWORD=${{ env.VALID_PASSWORD }}
          HEADLESS=true
          EOF

      - name: Run all tests in Docker
        run: |
          docker run --rm \
            --env-file .env \
            -v ${{ github.workspace }}/allure-results-docker:/app/reports/allure-results \
            ui-api-tests:latest \
            pytest \
              --alluredir=reports/allure-results/docker \
              -n auto \
              --reruns 2 \
              --reruns-delay 1

      - name: Upload Docker test results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-docker
          path: allure-results-docker/docker/
          retention-days: 7
          if-no-files-found: warn

  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [ui-tests, api-tests, docker-tests]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download UI results
        if: always()
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-results-ui
          path: allure-results/ui/

      - name: Download API results
        if: always()
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-results-api
          path: allure-results/api/

      - name: Download Docker results
        if: always()
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: allure-results-docker
          path: allure-results/docker/

      - name: Debug - List all files
        if: always()
        run: |
          echo "=== Структура allure-results ==="
          find allure-results -type f 2>/dev/null | head -50
          echo ""
          echo "=== Количество JSON файлов ==="
          find allure-results -name '*.json' 2>/dev/null | wc -l

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Allure CLI
        run: |
          curl -o allure.zip -L https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.zip
          unzip -q allure.zip -d /opt/allure
          echo "/opt/allure/allure-2.30.0/bin" >> $GITHUB_PATH

      - name: Verify Allure
        run: /opt/allure/allure-2.30.0/bin/allure --version

      - name: Check if gh-pages branch exists
        id: check-branch
        run: |
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Ветка gh-pages существует"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Ветка gh-pages не существует (первый запуск)"
          fi

      - name: Get Allure history
        if: steps.check-branch.outputs.exists == 'true'
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare history
        if: always()
        run: |
          mkdir -p allure-history
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history allure-history/ || true
            echo "История скопирована"
          else
            echo "История отсутствует (будет создана после первого деплоя)"
          fi

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "allure-results" ] && [ "$(find allure-results -name '*.json' 2>/dev/null | wc -l)" -gt 0 ]; then
            /opt/allure/allure-2.30.0/bin/allure generate allure-results -o allure-report --clean

            if [ -f "allure-report/index.html" ]; then
              sed -i 's|<head>|<head><base href="./">|' allure-report/index.html
              sed -i 's|<meta charset="utf-8">|<meta charset="utf-8">\n    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n    <meta http-equiv="Pragma" content="no-cache">\n    <meta http-equiv="Expires" content="0">|' allure-report/index.html
              echo "Добавлены <base href> и мета-теги кэширования"
            fi

            mkdir -p allure-history
            cp -r allure-report/* allure-history/ 2>/dev/null || true
          else
            echo "::warning::Нет allure results"
            mkdir -p allure-history
            echo "<html><body><h1>No test results</h1></body></html>" > allure-history/index.html
          fi

      - name: Add cache headers
        if: github.ref == 'refs/heads/main'
        run: |
          cat > allure-history/_headers <<'EOF'
          /*
            Cache-Control: no-cache, no-store, must-revalidate
            Pragma: no-cache
            Expires: 0
          EOF
          echo "Добавлен файл _headers"

      - name: Debug - Check generated report
        if: always()
        run: |
          echo "=== Содержимое allure-history ==="
          ls -la allure-history/
          echo ""
          echo "=== Проверка ключевых файлов ==="
          test -f allure-history/index.html && echo "index.html существует"
          test -f allure-history/app.js && echo "app.js существует"
          test -f allure-history/styles.css && echo "styles.css существует"
          test -d allure-history/data && echo "data/ существует"
          echo ""
          echo "=== Первые строки index.html ==="
          head -5 allure-history/index.html 2>/dev/null || echo "не найден"
          echo ""
          echo "=== Проверка <base href> ==="
          grep -o "<base href[^>]*>" allure-history/index.html 2>/dev/null || echo "<base href> не найден"

      - name: Upload Allure Report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: warn

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: allure-history/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Comment PR with Allure link
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const runId = context.runId;
            const repo = context.repo;
            const artifactUrl = `https://github.com/${repo.owner}/${repo.repo}/actions/runs/${runId}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: repo.owner,
              repo: repo.repo,
              body: `## Allure Report\n\n[Скачать отчёт из артефактов](${artifactUrl})\n\nПосле мержа в main отчёт будет опубликован на GitHub Pages.`
            });

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [lint, ui-tests, api-tests, docker-tests, allure-report]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Test Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- UI Tests: ${{ needs.ui-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- API Tests: ${{ needs.api-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Tests: ${{ needs.docker-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Allure Report: ${{ needs.allure-report.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.ui-tests.result }}" != "success" ] || \
             [ "${{ needs.api-tests.result }}" != "success" ] || \
             [ "${{ needs.docker-tests.result }}" != "success" ]; then
            echo "**Pipeline failed!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Причины:**" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.lint.result }}" != "success" ] && echo "- Lint: \`${{ needs.lint.result }}\`" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.ui-tests.result }}" != "success" ] && echo "- UI Tests: \`${{ needs.ui-tests.result }}\`" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.api-tests.result }}" != "success" ] && echo "- API Tests: \`${{ needs.api-tests.result }}\`" >> $GITHUB_STEP_SUMMARY
            [ "${{ needs.docker-tests.result }}" != "success" ] && echo "- Docker Tests: \`${{ needs.docker-tests.result }}\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "**All tests passed!**" >> $GITHUB_STEP_SUMMARY
          fi